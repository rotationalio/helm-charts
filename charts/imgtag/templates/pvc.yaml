apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ default (include "imgtag.fullname" .) .Values.persistence.name }}
  namespace: {{ .Release.namespace }}
  labels:
    {{- include "imgtag.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  storageClassName: {{ .Values.persistence.storageClass }}