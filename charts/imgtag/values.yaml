# Default values for imgtag.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Name overrides: by default the name for most objects will be release-vanity. It is
# recommended to create a descriptive release name, but if you must override the names
# separate from the release, you can set nameOverride. To remove the -vanity suffix
# set the fullnameOverride to the name you want.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: gcr.io/rotationalio-habanero/imgtag
  pullPolicy: IfNotPresent
  tag: 89ec287

imagePullSecrets: []

imgtag:
  dataDir: "/data"
  project: ""
  labels: []
  tasks: []
  width: 3840

prodigy:
  port: 8080
  host: "0.0.0.0"
  logging: "basic"

  oidc:
    enabled: false
    discoveryURL: ""
    clientID: ""

  # This should match ingress.hostname and include the scheme, e.g. https://
  deployedURL: ""

gcs:
  bucket: "weapons-detection"

# Specify the secrets to be used the application.
# Secrets are expected to be pre-installed in the cluster and referenced by the name
# and keys below. If you want Helm to create the secrets, set create to true and specify
# the secrets values below.
secrets:
  create: false
  oidcClientSecret:
    secretName: ""
    secretKey: oidc-client-secret
    value: ""

  # Helm will not create this secret, it is expected to be pre-installed in the cluster
  # from a JSON file with the specified file name and will be mounted on the pod.
  googleApplicationCredentials:
    secretName: ""
    secretKey: google-application-credentials.json
    mountPath: "/etc/credentials"

# Additional pod spec configuration
pod:
  annotations: {}
  labels: {}
  securityContext: {}
  resources: {}

# Additional container spec configuration
containers:
  securityContext: {}

persistence:
  name: ""
  mountPath: "/data"
  storageClass: "standard"
  size: "10Gi"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  apiVersion: traefik.io/v1alpha1
  className: IngressRoute
  hostname: ""
  annotations: {}
  entryPoints:
    - websecure
  tls: {}

livenessProbe:
  httpGet:
    path: /
    port: http
    httpHeaders:
    - name: X-Kubernetes-Probe
      value: liveness
  initialDelaySeconds: 300
  periodSeconds: 60

readinessProbe:
  httpGet:
    path: /
    port: http
    httpHeaders:
    - name: X-Kubernetes-Probe
      value: readiness
  initialDelaySeconds: 300
  periodSeconds: 60

# Pod requested resources and limits.
resources: {}

# Node selector for the pods.
nodeSelector: {}

# Tolerations for the pods.
tolerations: []

# Affinity rules for the pods.
affinity: {}
