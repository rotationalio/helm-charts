# Default values for deploying endeavor.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Name overrides: by default the name for most objects will be release-endeavor. It is
# recommended to create a descriptive release name, but if you must override the names
# separate from the release, you can set nameOverride. To remove the -endeavor suffix
# set the fullnameOverride to the name you want.
nameOverride: ""
fullnameOverride: ""

# Environment should be set to "demo", "development", "staging", or "production".
environment: "production"

# replicaCount should stay 1 when using the default blobs PVC (ReadWriteOnce). Scale only
# with ReadWriteMany storage or non-file blob backends (e.g. s3://), similar to Quarterdeck’s
# guidance for scaling with external databases.
replicaCount: 1

# Deployment rollout strategy. Used for s3:// blobs (e.g. GCS interop) and other non-file backends.
# When endeavor.blobs.uri uses file:// (RWO PVC), the chart overrides this with Recreate.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

image:
  repository: rotationalio/endeavor
  pullPolicy: Always                 # Specify image pull policy (Always, IfNotPresent, Never).
  tag: ""                            # Overrides the image tag whose default is the chart appVersion.

imagePullSecrets: []

# Global variables are available to both Endeavor and Quarterdeck charts
global:

  # Origins specifies all hosts that are in the Endeavor ecosystem and is used for the
  # allowed origins setting in CORS and the audience value in Quarterdeck.
  # Should be a full URLs with scheme (e.g. https://) and no trailing slashes.
  origins: []

  # Specifies the authentication URL for Quarterdeck, which reconfigures the
  # Quarterdeck subchart as needed as well as Endeavor related fields.
  # Should be a full URL with scheme (e.g. https://) and no trailing slash.
  issuer: ""

  # Specify a global log level for all microservices (can be overridden)
  # Verbosity of logging: trace, debug, info, warn, error, fatal, panic
  logging:
    level: info
    console: false

  # Specify a global mode for all microservices (release, debug, testing)
  # Only specify debug mode if you know what you're doing.
  mode: release


# Set the Endeavor specific configuration.
endeavor:
  # Maintenance mode can be used to run the pod without starting the service for debugging
  maintenance: false

  # Override global.mode
  mode: null

  # Override global.logging
  logLevel: null
  consoleLog: null

  # Origin (url) of the UI server for creating endpoints and CORS access
  # Should be an absolute URL including scheme without trailing slash that matches the
  # endpoint of the ingress configured below.
  origin: ""

  # Do not set this unless you're really sure; by default it will be the origin and
  # the Quarterdeck URL to ensure that CORS is configured correctly.
  allowOrigins: null

  # Set the display name for the Endeavor API Docs
  docsName: "Endeavor API Docs"

  # Set the URL for the Compass application
  compassURL: ""

  # Compass configuration
  compass:
    # Base URL for the Compass HTTP client
    base: null
    # Client request timeout (Go duration string)
    timeout: null

  # A string identifier for the organization that this endeavor instance serves
  organizationID: "endeavor"

  # Authentication configuration
  auth:
    # Override global.issuer (do not set unless you know what you're doing)
    quarterdeckURL: null

    # Override endeavor.origin as the primary audience (do not set unless you know what you're doing)
    audience: null

  # CSRF protection configuration
  csrf:
    cookieTTL: 15m

  # Manages browser security features such as Referrers, HSTS and Content Security Policies.
  secure:
    # If true adds the X-Content-Type-Options header with nosniff directive.
    contentTypeNosniff: true

    # Value for the Cross-Origin-Opener-Policy header.
    crossOriginOpenerPolicy: same-origin

    # Value for the Referrer-Policy header.
    referrerPolicy: strict-origin-when-cross-origin

    # Configure HSTS (HTTP Strict Transport Security) settings.
    hsts:
      # If non-zero, the HSTS header is added to responses.
      seconds: 63072000
      includeSubdomains: true
      preload: true

    # Specify directives for the Content-Security-Policy and Content-Security-Policy-Report-Only headers.
    # Note that if using 'self' or 'none' they must be quoted, e.g. use "'self'" or "'none'".
    # TODO: configure only the Endeavor-specific directives; these are only here as a placeholder.
    contentSecurity:
      policy:
        childSrc: []
        connectSrc: []
        defaultSrc: []
        fencedFrameSrc: []
        fontSrc: []
        frameSrc: []
        imgSrc: []
        manifestSrc: []
        mediaSrc: []
        objectSrc: []
        prefetchSrc: []
        scriptSrc: []
        scriptSrcElem: []
        scriptSrcAttr: []
        styleSrc: []
        styleSrcElem: []
        styleSrcAttr: []
        workerSrc: []
        baseUri: []
        sandbox: []
        formAction: []
        frameAncestors: []
        reportTo: ""
        requireTrustedTypesFor: []
        trustedTypes: []
        upgradeInsecureRequests: false
      reportOnly:
        childSrc: []
        connectSrc: []
        defaultSrc: []
        fencedFrameSrc: []
        fontSrc: []
        frameSrc: []
        imgSrc: []
        manifestSrc: []
        mediaSrc: []
        objectSrc: []
        prefetchSrc: []
        scriptSrc: []
        scriptSrcElem: []
        scriptSrcAttr: []
        styleSrc: []
        styleSrcElem: []
        styleSrcAttr: []
        workerSrc: []
        baseUri: []
        sandbox: []
        formAction: []
        frameAncestors: []
        reportTo: ""
        requireTrustedTypesFor: []
        trustedTypes: []
        upgradeInsecureRequests: false

  # Inference specifies the configuration for the inference client
  inference:
    endpointURL: https://openrouter.ai/api/v1

  # Radish specifies the configuration for the async task client
  radish:
    workers: 8
    queueSize: 128

  # Tasks: load horizon task routes from a zip at startup when enableLoader is true.
  # LoaderPath must be an absolute path inside the container and must point to a ZIP that
  # contains the Horizon tasks archive (v0.32+).
  tasks:
    enableLoader: false
    # Absolute path to the Horizon tasks zip; use with storage.tasks mount (emptyDir) when not on a blobs PVC.
    loaderPath: /var/run/endeavor/horizontasks/compass.zip
    # Optional Beacon fixture API (see endeavor BeaconConfig). When beaconUrl is set,
    # ENDEAVOR_TASKS_BEACON_BEACON_URL is exported. Set beaconTTL (e.g. 5m) for periodic refresh.
    # Basic auth is optional cleartext env (temporary); omit username/password to skip cred env vars.
    beacon:
      beaconUrl: ""
      beaconTTL: ""
      # TODO: basic auth is temporary; replace this when licence key API is supported.
      basicAuthUsername: ""
      basicAuthPassword: ""

  # MCP specifies the configuration for the MCP gateway and related systems
  mcp:
    refreshControllerInterval: null
    integrationRefreshInterval: null

  # Coffer encrypts application secrets at rest. When enabled, set secrets.cofferKeys
  # to a dedicated Secret containing ENDEAVOR_COFFER_KEYS (see endeavor README).
  coffer:
    enabled: false

  # Telemetry is primarily configured via the open telemetry sdk environment variables. As such there is no need to
  # specify OTel specific configuration here. This config is used primarily to enable/disable telemetry and to set
  # values for custom telemetry.
  # 'endeavor.telemetry.serviceName' uses env var: OTEL_SERVICE_NAME
  # 'endeavor.telemetry.serviceAddr' uses env var: GIMLET_OTEL_SERVICE_ADDR
  telemetry:
    enabled: true
    serviceName: null
    serviceAddr: null

  # Blobs specifies the configuration for the 'blobs' blob storage module.
  # - Empty or unset uri: no ENDEAVOR_BLOBS_URI and no volume mount.
  # - file:// URIs: ENDEAVOR_BLOBS_URI is set; the path after file:// is the container mount
  #   path, backed by storage.blobs (PVC) unless storage.blobs.existingClaim is set.
  # - s3:// URIs: remote object storage (no PVC). Production on GKE typically uses GCS via the
  #   S3-compatible API, e.g.:
  #     s3://BUCKET/TENANT_PREFIX?endpoint=https://storage.googleapis.com&region=auto
  #   Use GCS HMAC keys as AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (secrets.aws), or another
  #   AWS SDK credential source. See endeavor pkg/blobs/config.go for query parameters.
  blobs:
    uri: file:///blobs

# PVC for local blob storage when endeavor.blobs.uri uses the file:// scheme. Ignored for
# non-file URIs. If existingClaim is set, the chart does not create a PVC and mounts that claim.
storage:
  blobs:
    existingClaim: ""
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
  # Ephemeral volume for Beacon task zip bootstrap/refresh (enableLoader and/or beacon URL).
  tasks:
    mountPath: /var/run/endeavor/horizontasks
    emptyDir: {}

quarterdeck:
  enabled: true

# Specify the secrets to be used by Endeavor.
# Endeavor expects these secrets are already pre-installed in the cluster and referenced
# by the name and keys below. If you want Helm to create the secrets, set create to true
# and specify the secrets values below.
secrets:
  create: false
  databaseURL:
    secretName: ""
    secretKey: databaseURL
    value: ""
  inferenceAPIKey:
    secretName: ""
    secretKey: inferenceAPIKey
    value: ""
  csrfSecret:
    secretName: ""
    secretKey: csrfSecret
    value: ""
  # Coffer key material (ENDEAVOR_COFFER_KEYS string, e.g. ":<base64-pkcs8>").
  # Defaults to the same Secret as databaseURL when secretName is unset.
  cofferKeys:
    secretName: ""
    secretKey: cofferKeys
    value: ""
  # GCS interop: store HMAC access id/secret as AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY in this secret.
  # Omit secretName when credentials come from another AWS SDK source.
  aws:
    secretName: ""
    accessKeyIDKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY

# Additional pod spec configuration
pod:
  annotations: {}
  labels: {}
  securityContext: {}
  resources: {}

# Additional container spec configuration
containers:
  securityContext: {}

service:
  type: ClusterIP
  port: 8000

# Currently setup for Traefik ingress routes, not nginx or k8s networking ingresses.
ingress:
  enabled: false
  apiVersion: traefik.io/v1alpha1
  className: IngressRoute
  annotations: {}
  entryPoints:
    - websecure
  tls: {}

# The liveness probe requires Endeavor to be running.
livenessProbe:
  httpGet:
    path: /livez
    port: 8000
    httpHeaders:
    - name: X-Kubernetes-Probe
      value: liveness
  initialDelaySeconds: 2
  periodSeconds: 10

# The readiness probe requires Endeavor to be running and connected to the database.
readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
    httpHeaders:
    - name: X-Kubernetes-Probe
      value: readiness
  initialDelaySeconds: 2
  periodSeconds: 10

# Pod requested resources and limits.
resources: {}

# Node selector for the pods.
nodeSelector: {}

# Tolerations for the pods.
tolerations: []

# Affinity rules for the pods.
affinity: {}
